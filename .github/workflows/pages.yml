name: Lighthouse Preview

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/pages.yml'
      - 'app/**'
      - 'server/**'
      - 'shared/**'
      - 'scripts/**'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'tsconfig.json'

permissions:
  contents: read

concurrency:
  group: lighthouse-preview
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate static preview
        run: npm run generate
        env:
          NITRO_PRESET: static
          NUXT_APP_BASE_URL: /
          NUXT_PUBLIC_SITE_URL: http://127.0.0.1:4173

      - name: Serve static preview
        run: npx --yes serve@latest .output/public --listen 4173 > serve.log 2>&1 &

      - name: Wait for preview
        run: node scripts/wait-for-url.mjs http://127.0.0.1:4173

      - name: Warm Lighthouse browser
        run: npx --yes lighthouse@latest http://127.0.0.1:4173 --chrome-flags="--headless=new --no-sandbox" --only-categories=performance --output=json --output-path=/tmp/lighthouse-warmup.json --quiet

      - name: Lighthouse home
        run: npx --yes lighthouse@latest http://127.0.0.1:4173 --chrome-flags="--headless=new --no-sandbox" --output=json --output-path=lighthouse-home.json --quiet

      - name: Lighthouse parks
        run: npx --yes lighthouse@latest http://127.0.0.1:4173/parken --chrome-flags="--headless=new --no-sandbox" --output=json --output-path=lighthouse-parken.json --quiet

      - name: Check Lighthouse scores
        run: node scripts/check-lighthouse.mjs lighthouse-home.json lighthouse-parken.json

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            lighthouse-*.json
            serve.log